  <h2>Pipitとは</h2>
  <p>写真をごく小さなファイルに変換して送り、受け取った相手が同じアプリで元の写真に
  復元します。月のギガを使い切って通信が遅くなった後や、電波の弱い場所での写真送信に
  役立ちます。圧縮も復元もすべて端末内で完結し、写真が外部に送られることはありません。</p>
